<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CINE PIPOCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="account-page" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background:var(--nav-bg);">
    <div style="background: #111; padding: 40px; border-radius: 8px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center;">
        <h1 class="logo-rgb" style="cursor: pointer; font-size:2rem;" onclick="window.location.href='index.html'">🍿 CINE PIPOCA</h1>
        <h3 style="margin: 20px 0; color:#aaa;">Entrar na Conta</h3>
        
        <button class="play-btn" style="width:100%; height:45px; border-radius:4px; font-size:0.8rem; margin-bottom:15px; border: 2px solid var(--primary-red); background: #111;" onclick="BD.logar('@gameradozinho'); window.location.href='conta.html';">Teste Rápido (@gameradozinho)</button>
        <button class="play-btn" style="width:100%; height:45px; border-radius:4px; font-size:0.8rem; margin-bottom:25px; border: 2px solid var(--primary-red); background: #111;" onclick="BD.logar('@gamerado'); window.location.href='conta.html';">Teste Rápido (@gamerado)</button>

        <p style="font-size: 0.8rem; color: #666; margin-bottom: 25px;">Para um login simulado, use os botões acima. Para um sistema real, use os campos abaixo (fachada).</p>
        
        <input type="text" placeholder="Nome de usuário (@username)" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px; font-family:'Poppins'">
        <input type="password" placeholder="Senha" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px; font-family:'Poppins'">
        
        <button class="circle-btn play-main" style="width:100%; height:45px; border-radius:4px; font-size:0.8rem; margin-top:10px;">Login</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Ainda não tem conta? <a href="cadastro.html" style="color:var(--primary-red);">Cadastre-se</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
