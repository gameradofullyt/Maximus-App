<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CINE PIPOCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="account-page" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background:var(--nav-bg);">
    <div style="background: #111; padding: 40px; border-radius: 8px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center;">
        <h1 class="logo-rgb" style="cursor: pointer; font-size:2rem;" onclick="window.location.href='index.html'">🍿 CINE PIPOCA</h1>
        <h3 style="margin: 20px 0; color:#aaa;">Entrar na Conta</h3>
        
        <input type="text" id="log-user" placeholder="Nome de usuário (@username)" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px;">
        <input type="password" id="log-pass" placeholder="Senha" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px;">
        
        <button class="circle-btn play-main" style="width:100%; height:45px; border-radius:4px;" onclick="fazerLogin()">Login</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Ainda não tem conta? <a href="cadastro.html" style="color:var(--primary-red);">Cadastre-se</a></p>
    </div>
    <script src="script.js"></script>
    <script>
        // Redireciona se já estiver logado
        if(BD.getLogado()) window.location.href = 'conta.html';
        
        function fazerLogin() {
            const u = document.getElementById('log-user').value.trim();
            const p = document.getElementById('log-pass').value.trim();
            if(u && p) {
                if(BD.logar(u, p)) window.location.href = 'conta.html';
            } else { alert("Preencha todos os campos!"); }
        }
    </script>
</body>
</html>
