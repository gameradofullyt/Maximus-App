<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta | CINE PIPOCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para selo giratório e moderação na conta */
        .verified-badge { color: #1DA1F2; margin-left: 8px; animation: rotateBadge 4s linear infinite; display: inline-block; font-size: 1rem;}
        @keyframes rotateBadge { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .mod-controls { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.3); padding: 15px; border-radius: 8px; margin: 20px; text-align: center; }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-dot.active { border-color: #fff; transform: scale(1.1); }
    </style>
</head>
<body class="account-page">

    <div class="profile-header">
        <input type="file" id="upload-banner" accept="image/*,video/*" hidden>
        <input type="file" id="upload-avatar" accept="image/*,video/*" hidden>

        <div class="profile-banner" id="banner-container">
            <div id="banner-content"></div> <div class="edit-overlay" onclick="document.getElementById('upload-banner').click()"><i class="fas fa-camera"></i> Alterar Capa</div>
        </div>
        
        <div class="profile-info-container">
            <div class="profile-avatar-wrapper">
                <div class="profile-avatar" id="avatar-container">
                    <div id="avatar-content"></div> </div>
                <div class="edit-overlay-circle" onclick="document.getElementById('upload-avatar').click()"><i class="fas fa-camera"></i></div>
            </div>
            <h2 class="profile-name" id="user-display-name">Carregando...</h2>
            <p class="profile-stats">Membro desde 2024 • Pontos: <span id="user-points">0</span></p>
        </div>
    </div>

    <div id="mod-panel" class="mod-controls" style="display: none;">
        <h3 style="color: #ff4757; margin-bottom: 10px;"><i class="fas fa-shield-alt"></i> Painel de Moderador</h3>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 15px;">Ações de moderação simuladas no Banco de Dados local.</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="play-btn" style="background: #ff4757;" onclick="alert('Funcionalidade de banimento simulada!')">Banir Usuário</button>
            <button class="play-btn" style="background: #2ed573;" onclick="alert('Funcionalidade de desbanimento simulada!')">Desbanir Usuário</button>
        </div>
    </div>

    <main class="content">
        
        <section class="category-slider">
            <div class="category-header">
                <h2>Meus Favoritos</h2>
                <a href="explorar.html" class="ver-mais-btn">Mais ></a>
            </div>
            <div class="slider-wrapper">
                <button class="slider-arrow prev" onclick="scrollSlider(this, -1)">&#10094;</button>
                <div class="slider-track" id="favoritos-track">
                    </div>
                <button class="slider-arrow next" onclick="scrollSlider(this, 1)">&#10095;</button>
            </div>
        </section>

        <section class="category-slider">
            <div class="category-header">
                <h2>Histórico de Exibição</h2>
                <a href="login.html" class="ver-mais-btn">Mais ></a>
            </div>
            <div class="slider-wrapper">
                <button class="slider-arrow prev" onclick="scrollSlider(this, -1)">&#10094;</button>
                <div class="slider-track" id="historico-track">
                    </div>
                <button class="slider-arrow next" onclick="scrollSlider(this, 1)">&#10095;</button>
            </div>
        </section>

        <section class="category-slider" style="margin-bottom: 80px;">
            <div class="category-header">
                <h2>Configurações</h2>
            </div>
            <div style="background: #111; padding: 20px; border-radius: 8px; border: 1px solid #222;">
                <h3 style="font-size: 1rem; margin-bottom: 15px;">Mudar Tema do Site</h3>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div class="theme-dot active" style="background: #C63C51;" onclick="BD.mudarTema('dark', this)" title="Padrão Vermelho"></div>
                    <div class="theme-dot" style="background: #1DA1F2;" onclick="BD.mudarTema('blue', this)" title="Azul"></div>
                    <div class="theme-dot" style="background: #2ed573;" onclick="BD.mudarTema('green', this)" title="Verde"></div>
                    <div class="theme-dot" style="background: #ffa502;" onclick="BD.mudarTema('orange', this)" title="Laranja"></div>
                    <div class="theme-dot" style="background: #a4b0be; border: 2px solid #555;" onclick="BD.mudarTema('light', this)" title="Claro"></div>
                </div>
                <div class="option-row" style="margin-top: 20px; color: #ff4757; border-top: 1px solid #222;" onclick="BD.deslogar()"><i class="fas fa-sign-out-alt"></i> Sair da Conta <span>></span></div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Principal</span></a>
        <a href="generos.html" class="nav-item"><i class="fas fa-th-large"></i><span>Gêneros</span></a>
        <a href="explorar.html" class="nav-item"><i class="fas fa-compass"></i><span>Explorar</span></a>
        <a href="pedidos.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>Pedidos</span></a>
        <a href="social.html" class="nav-item"><i class="fas fa-users"></i><span>Social</span></a>
        <a href="conta.html" class="nav-item active"><i class="fas fa-user"></i><span>Conta</span></a>
    </nav>

    <script src="script.js"></script>
    <script>
        // Carrega dados da conta ao abrir a página
        window.onload = () => {
            BD.carregarDadosContaPage();
        };

        // Função genérica para processar upload da galeria
        function processarUpload(inputId, isBanner) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const result = event.target.result;
                        const fileType = file.type.split('/')[0]; // 'image' ou 'video'
                        
                        // Salva no Banco de Dados Local
                        if(isBanner) {
                            BD.salvarMidiaPerfil('banner', result, fileType);
                        } else {
                            BD.salvarMidiaPerfil('avatar', result, fileType);
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        processarUpload('upload-banner', true);
        processarUpload('upload-avatar', false);
    </script>
</body>
</html>
