<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | CINE PIPOCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="account-page" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background:var(--nav-bg);">
    <div style="background: #111; padding: 40px; border-radius: 8px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center;">
        <h1 class="logo-rgb" style="cursor: pointer; font-size:2rem;" onclick="window.location.href='index.html'">🍿 CINE PIPOCA</h1>
        <h3 style="margin: 20px 0; color:#aaa;">Criar Nova Conta</h3>
        
        <input type="text" id="cad-nome" placeholder="Nome Completo" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px;">
        <input type="text" id="cad-user" placeholder="Nome de usuário (ex: @gamerado)" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px;">
        <input type="password" id="cad-pass" placeholder="Senha" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px;">
        
        <button class="circle-btn play-main" style="width:100%; height:45px; border-radius:4px;" onclick="fazerCadastro()">Criar Conta</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Já tem conta? <a href="login.html" style="color:var(--primary-red);">Login</a></p>
    </div>
    <script src="script.js"></script>
    <script>
        if(BD.getLogado()) window.location.href = 'conta.html';
        function fazerCadastro() {
            const n = document.getElementById('cad-nome').value.trim();
            const u = document.getElementById('cad-user').value.trim();
            const p = document.getElementById('cad-pass').value.trim();
            if(n && u && p) {
                if(!u.startsWith('@')) { alert("O nome de usuário deve começar com @"); return; }
                if(BD.cadastrar(n, u, p)) {
                    alert("Conta criada! Faça o login.");
                    window.location.href = 'login.html';
                }
            } else { alert("Preencha tudo!"); }
        }
    </script>
</body>
</html>
