<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | CINE PIPOCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="account-page" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background:var(--nav-bg);">
    <div style="background: #111; padding: 40px; border-radius: 8px; border: 1px solid #222; width: 100%; max-width: 450px; text-align: center;">
        <h1 class="logo-rgb" style="cursor: pointer; font-size:2rem;" onclick="window.location.href='index.html'">🍿 CINE PIPOCA</h1>
        <h3 style="margin: 20px 0; color:#aaa;">Criar Nova Conta</h3>
        
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 25px;">A simulação de Banco de Dados local permite o cadastro (Fachada).</p>
        
        <input type="text" placeholder="Nome Completo" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px; font-family:'Poppins'">
        <input type="text" placeholder="Nome de usuário (@username - Único)" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px; font-family:'Poppins'">
        <input type="password" placeholder="Senha" class="search-input" style="width:100%; border-radius:4px; border: 1px solid #333; background: #111; padding: 12px; margin-bottom:15px; font-family:'Poppins'">
        
        <button class="circle-btn play-main" style="width:100%; height:45px; border-radius:4px; font-size:0.8rem; margin-top:10px;">Criar Conta</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Já tem conta? <a href="login.html" style="color:var(--primary-red);">Login</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
